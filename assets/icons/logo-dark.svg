<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 158 40" fill="none" role="img" aria-label="Valírica">
  <defs>
    <linearGradient id="bg-dark" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#013d5a"/>
      <stop offset="100%" stop-color="#011726"/>
    </linearGradient>
    <linearGradient id="v-dark" x1="9" y1="10" x2="20" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.75"/>
    </linearGradient>
  </defs>

  <!-- Icon mark -->
  <rect width="40" height="40" rx="9" fill="url(#bg-dark)"/>
  <rect width="40" height="40" rx="9" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <path d="M9.5 10.5 L20 27.5 L30.5 10.5"
